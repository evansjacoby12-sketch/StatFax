name: Build slate + deploy

# Free always-on hosting: run the brain's slate on a schedule, build the UI,
# and publish the static site (UI + dist/*.json) to GitHub Pages.
#
# ONE-TIME SETUP: push this repo to GitHub → Settings → Pages → "Build and
# deployment" → Source = "GitHub Actions". (Use a PUBLIC repo for unlimited
# Actions minutes, or trim the cron for a private one.) Then open the Pages URL.

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
  # The Cloudflare worker (server/cloudflare) fires this every 10 min on CF's
  # reliable cron — GitHub's own `schedule` trigger is best-effort and gets
  # dropped almost entirely (≈1 run in 22h observed), which left the slate stale.
  repository_dispatch:
    types: [slate-refresh]
  push:
    branches: [main]
  schedule:
    # Cron is UTC. GitHub throttles scheduled runs, so these are best-effort
    # targets, not guarantees — the tighter cadence during game hours just gives
    # more chances to fire so live scores/innings don't freeze between rebuilds.
    #
    # MLB game window ≈ 16:00 UTC (noon ET day games) through ~07:00 UTC (late
    # west-coast games + the post-midnight US-Central day rollover) — refresh
    # every ~10 min there. Sparser the rest of the day when nothing is live.
    - cron: '*/10 16-23 * * *'
    - cron: '*/10 0-6 * * *'
    - cron: '*/30 7-15 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress slate finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  nfl-ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          npm install
          npm --prefix ui install
      - name: Test NFL engine and pipeline
        run: npm test
      - name: Build current NFL snapshot and walk-forward baseline
        run: |
          npm run nfl:history:quick
          npm run nfl:backtest
          npm run nfl:slate
      - name: Smoke and build UI
        run: |
          npm --prefix ui run smoke
          npm --prefix ui run build

  build-deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Persist the rolling reconcile/backtest log across runs (drives
      # calibration + the Results view). Unique key always saves; restore-keys
      # pulls the latest prior log.
      - name: Restore backtest log
        uses: actions/cache@v4
        with:
          path: dist/backtest-log.json
          key: backtest-log-${{ github.run_id }}
          restore-keys: backtest-log-

      # Per-day pregame freeze (keeps started-game batters at pre-first-pitch
      # model/form values). Same unique-key-saves / restore-by-prefix pattern.
      - name: Restore pregame freeze
        uses: actions/cache@v4
        with:
          path: dist/pregame-freeze.json
          key: pregame-freeze-${{ github.run_id }}
          restore-keys: pregame-freeze-

      # Carry the prior LLM context.json across runs so the context pass can see
      # it and reuse a recent result — without this every fresh container starts
      # empty and the staleness guard would re-pay the API on every 10-min tick.
      - name: Restore context pass
        uses: actions/cache@v4
        with:
          path: dist/context.json
          key: context-${{ github.run_id }}
          restore-keys: context-

      # Rolling pregame AI experiment. Stores baseline + hypothetical shadow
      # probabilities for later outcome grading; never feeds the live board.
      - name: Restore AI HR shadow ledger
        uses: actions/cache@v4
        with:
          path: dist/ai-hr-shadow.json
          key: ai-hr-shadow-${{ github.run_id }}
          restore-keys: ai-hr-shadow-

      # Rolling source-backed watchdog record. Alerts are preserved after they
      # expire and are settled later against objective MLB box-score facts.
      - name: Restore MLB data health history
        uses: actions/cache@v4
        with:
          path: dist/mlb-data-health-history.json
          key: mlb-data-health-history-${{ github.run_id }}
          restore-keys: mlb-data-health-history-

      # Carry the prior Slate Brief across runs so its same-day staleness guard
      # can reuse a recent result instead of re-paying the API on every tick.
      - name: Restore slate brief
        uses: actions/cache@v4
        with:
          path: dist/brief.json
          key: brief-${{ github.run_id }}
          restore-keys: brief-

      # Intraday combo-board history — accumulates this day's per-run snapshots so
      # we can measure how the board shifts morning → first pitch. Same unique-key-
      # saves / restore-by-prefix pattern (rolls over in-file on date change).
      - name: Restore board history
        uses: actions/cache@v4
        with:
          path: dist/board-history.json
          key: board-history-${{ github.run_id }}
          restore-keys: board-history-

      # Held-out inputs corpus — the frozen scoreBatter() argument bundle per day
      # (dist/inputs-<date>.json). Accumulated across runs (glob path carries every
      # dated file forward, same unique-key-saves / restore-by-prefix pattern) so
      # engine changes can be A/B re-scored against reconciled outcomes offline
      # (model-lab/ab-rescore.mjs). Previously each run started empty and discarded
      # its one file, so the corpus could never grow and the up-weight validation
      # had no held-out set. (Unbounded for now — add a rolling prune once it's deep.)
      - name: Restore inputs corpus
        uses: actions/cache@v4
        with:
          path: dist/inputs-*.json
          key: inputs-corpus-${{ github.run_id }}
          restore-keys: inputs-corpus-

      - name: Restore NFL history
        uses: actions/cache@v4
        with:
          path: dist/nfl/history.json
          key: nfl-history-full-${{ hashFiles('server/sports/nfl/build-history.py') }}

      - name: Restore NFL season tracking
        uses: actions/cache@v4
        with:
          path: dist/nfl/tracking.json
          key: nfl-tracking-${{ github.run_id }}
          restore-keys: nfl-tracking-

      - name: Install brain deps
        run: npm install

      - name: Tests
        run: npm test

      # ODDS_API_KEY (the-odds-api.com) unlocks HR prop prices: board odds,
      # +EV chips, parlay EV, and the reconcile log's vig field. Optional —
      # without it the slate builds exactly as before. ODDS_REFRESH_MINUTES
      # (repo variable) throttles credit burn: each successful refresh ≈ 1
      # credit per pregame game (~15/slate); empty pulls before books post
      # are free and retry every run. Default 1440 = ONE paid pull per day
      # (~450 credits/mo, fits the free 500/mo tier). On a paid plan set the
      # repo variable lower (e.g. 120) for intraday line movement.
      - name: Generate slate (live MLB + Savant)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REFRESH_MINUTES: ${{ vars.ODDS_REFRESH_MINUTES || '1440' }}
        run: |
          npm run build-model
          npm run slate

      - name: Validate MLB data contracts
        run: |
          npm run validate:mlb-data
          npm run validate:list-builder-evidence

      - name: Generate NFL slate
        env:
          SPORTSGAMEODDS_API_KEY: ${{ secrets.SPORTSGAMEODDS_API_KEY }}
        run: |
          if [ ! -f dist/nfl/history.json ] || ! node -e "const h=require('./dist/nfl/history.json');process.exit(h.version>=2?0:1)"; then npm run nfl:history; fi
          npm run nfl:backtest
          npm run nfl:slate

      # Publish rolling state back to R2 (S3-compatible). daily.json is held
      # until the external-context production overlay has run below, so R2 and
      # the UI receive exactly the same probabilities. This also lets the NEXT
      # run's reconcile read a fresh "yesterday" snapshot from a DURABLE store
      # instead of depending on an external publisher (the gap that froze the
      # rolling log). No-op (and never blocks the deploy) unless the R2 secrets
      # are configured. To enable, add repo secrets R2_ACCESS_KEY_ID,
      # R2_SECRET_ACCESS_KEY, R2_ACCOUNT_ID and repo variable R2_BUCKET (create an
      # R2 API token in the Cloudflare dashboard → R2 → Manage API Tokens).
      - name: Publish artifacts to R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:             ${{ vars.R2_BUCKET }}
          # Recent aws-cli sends checksum headers R2 can reject; only send when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION:  when_required
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 publish skipped — set secrets R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ACCOUNT_ID and var R2_BUCKET to enable."
            exit 0
          fi
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          for f in calibration.json backtest-log.json list-builder-evidence.json board-history.json zone-cache.json; do
            if [ -f "dist/$f" ]; then
              aws s3 cp "dist/$f" "s3://$R2_BUCKET/$f" --endpoint-url "$ENDPOINT" \
                --content-type application/json --cache-control no-cache \
                && echo "R2: published $f"
            fi
          done
          if [ -f "dist/nfl/daily.json" ]; then
            aws s3 cp "dist/nfl/daily.json" "s3://$R2_BUCKET/nfl/daily.json" --endpoint-url "$ENDPOINT" \
              --content-type application/json --cache-control no-cache \
              && echo "R2: published nfl/daily.json"
          fi
          if [ -f "dist/nfl/backtest.json" ]; then
            aws s3 cp "dist/nfl/backtest.json" "s3://$R2_BUCKET/nfl/backtest.json" --endpoint-url "$ENDPOINT" \
              --content-type application/json --cache-control no-cache \
              && echo "R2: published nfl/backtest.json"
          fi
          if [ -f "dist/nfl/tracking.json" ]; then
            aws s3 cp "dist/nfl/tracking.json" "s3://$R2_BUCKET/nfl/tracking.json" --endpoint-url "$ENDPOINT" \
              --content-type application/json --cache-control no-cache \
              && echo "R2: published nfl/tracking.json"
          fi

      # Source-backed AI HR context (injuries/lineups/weather/bullpen →
      # dist/context.json). Extraction is advisory; only the deterministic,
      # capped production overlay below can touch probability.
      # Skips itself if the key is unset; a flaky API call emits a valid empty
      # artifact so the board can still deploy.
      - name: Context pass (Tavily + OpenAI)
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_HR_MODEL: ${{ vars.AI_HR_MODEL || 'gpt-5.6-luna' }}
        run: npm run context || true

      - name: Validate AI HR context contract
        run: npm run validate:ai-context

      # Deterministic feed/identity checks are the enforcement authority. The
      # sourced AI context can add review warnings, but it cannot block a slate
      # or mutate a score. Any team/side/opposing-pitcher contradiction stops
      # this run before production probabilities or public artifacts are built.
      - name: Build MLB data health watchdog report
        run: npm run mlb:data-health

      - name: Validate MLB data health watchdog
        run: npm run validate:mlb-data-health

      - name: Capture and settle MLB data health history
        run: npm run mlb:data-health-history

      - name: Validate MLB data health history
        run: npm run validate:mlb-data-health-history

      - name: Build AI HR shadow projections
        run: npm run ai:hr-shadow

      - name: Validate AI HR shadow ledger
        run: npm run validate:ai-shadow

      - name: Grade AI HR shadow projections
        run: npm run ai:hr-evaluate

      - name: Validate AI HR evaluation report
        run: npm run validate:ai-evaluation

      - name: Build AI HR postgame attribution
        run: npm run ai:hr-attribution

      - name: Validate AI HR postgame attribution
        run: npm run validate:ai-attribution

      # Manual production promotion (2026-07-15): apply the versioned
      # external-factor hypothesis despite the sample gate. This changes only
      # hrProbability, never score/grade/simulation/calibration.
      - name: Apply capped AI HR production adjustment
        run: npm run ai:hr-production

      - name: Validate AI HR production adjustment
        run: |
          npm run validate:ai-production
          npm run validate:mlb-data
          npm run validate:mlb-data-health

      # Publish the adjusted slate and its complete AI audit trail together.
      # The UI build below reads this same adjusted dist/daily.json.
      - name: Publish production slate and AI HR artifacts to R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET:             ${{ vars.R2_BUCKET }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION:  when_required
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 production publish skipped — R2 credentials are not configured."
            exit 0
          fi
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          for f in daily.json context.json mlb-data-health.json mlb-data-health-history.json ai-hr-shadow.json ai-hr-evaluation.json ai-hr-attribution.json ai-hr-production.json; do
            if [ -f "dist/$f" ]; then
              aws s3 cp "dist/$f" "s3://$R2_BUCKET/$f" --endpoint-url "$ENDPOINT" \
                --content-type application/json --cache-control no-cache \
                && echo "R2: published $f"
            fi
          done

      # Structured Decision Brief → dist/brief.json. OpenAI selects only from
      # allow-listed engine facts and adds narrative; it never supplies or
      # changes predictions. Skips without the key; `|| true` never blocks deploy.
      - name: Slate brief (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEF_MODEL: ${{ vars.BRIEF_MODEL || 'gpt-5.6-luna' }}
        run: npm run brief || true

      - name: Build UI
        env:
          # Worker /parse endpoint for the natural-language Signal Backtest box.
          # Falls back to the repo variable if set; otherwise the hardcoded URL.
          # Not a secret (public endpoint; CORS-gated). Box hides if blank.
          VITE_PARSE_URL: ${{ vars.VITE_PARSE_URL || 'https://statfax-cron.evansjacoby12.workers.dev/parse' }}
          # Worker base URL for the Spray tab's /savant-bip proxy endpoint.
          VITE_WORKER_URL: ${{ vars.VITE_WORKER_URL || 'https://statfax-cron.evansjacoby12.workers.dev' }}
        run: |
          npm --prefix ui install
          npm --prefix ui run smoke   # headless-render every view against the slate; fails the deploy on a crash
          npm --prefix ui run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

      # Pages throttles deployments that come in quick succession ("Deployment
      # failed, try again later" — observed repeatedly on 2026-07-03 when 5
      # pushes landed within 30 min; isolated deploys always succeed). Two
      # retries with growing backoff: 60s clears transient flakes, 5min clears
      # a short throttle window. Only the LAST attempt's failure fails the run.
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Backoff before retry 1
        if: steps.deploy.outcome == 'failure'
        run: sleep 60
      - name: Retry deploy 1
        id: deploy-retry1
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Backoff before retry 2
        if: steps.deploy.outcome == 'failure' && steps.deploy-retry1.outcome == 'failure'
        run: sleep 300
      - name: Retry deploy 2 (final)
        if: steps.deploy.outcome == 'failure' && steps.deploy-retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4
