<header class="flex items-center justify-between gap-4 border-b border-white/10 bg-[#07060c]/90 px-5 py-3 text-[#f2f2f5] backdrop-blur-xl">
  <div class="flex min-w-0 items-center gap-4">
    <div class="flex items-center gap-2.5">
      <img src="/icon.png" alt="StatFax" class="h-9 w-9 rounded-[10px] object-cover" />
      <div class="leading-none">
        <div class="text-[17px] font-extrabold tracking-tight">StatFax</div>
        <div class="mt-1 text-[10px] font-semibold uppercase tracking-[0.08em] text-[#858491]">Model board</div>
      </div>
    </div>
    <div class="hidden items-center gap-2 text-xs text-[#c4c4cc] sm:flex">
      <span class="font-semibold text-[#f2f2f5]">2026-07-13</span>
      <span class="text-[#676673]">·</span>
      <span>0 games</span>
      <span class="text-[#676673]">·</span>
      <span>0 / 0 batters</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <button class="grid h-9 w-9 place-items-center rounded-[10px] border border-white/10 bg-white/[0.03] text-[#c4c4cc]" aria-label="Live state">⌁</button>
    <button class="grid h-9 w-9 place-items-center rounded-[10px] border border-white/10 bg-white/[0.03] text-[#c4c4cc]" aria-label="Tools">⌄</button>
    <button class="grid h-9 w-9 place-items-center rounded-[10px] border border-white/10 bg-white/[0.03] text-[#c4c4cc]" aria-label="Refresh">↻</button>
  </div>
</header>
