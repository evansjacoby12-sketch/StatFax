<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>StatFax · Sports Intelligence</title>
    <meta name="description" content="Multi-sport model boards, signals, matchup research, and Bet Lab tools." />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32.png" />
    <!-- iOS requires a PNG here — an SVG apple-touch-icon silently falls back
         to a page screenshot on the home screen. -->
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon.png" />
    <!-- Full-screen portrait launch artwork for modern iPhones. iOS requires
         an exact pixel-size match for custom PWA startup images. -->
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1320x2868.jpg" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1206x2622.jpg" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1290x2796.jpg" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1179x2556.jpg" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1284x2778.jpg" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1170x2532.jpg" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-828x1792.jpg" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#07060c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Opaque black status bar: iOS lays the app out BELOW the clock, so the
         brand can never underlap it — no env(safe-area-inset-top) required.
         With the pure-black theme the bar is indistinguishable from the app,
         so nothing is lost vs black-translucent (which needed padding that
         proved unreliable across builds/devices). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="StatFax" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Self-heal a stale-cached index.html: if a content-hashed asset fails to
      // load (deleted by a newer deploy), reload once bypassing cache instead of
      // sitting on a blank page.
      window.addEventListener(
        'error',
        function (e) {
          var t = e && e.target
          if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK') && /\/assets\//.test(t.src || t.href || '')) {
            if (!sessionStorage.getItem('sfStaleReload')) {
              sessionStorage.setItem('sfStaleReload', '1')
              location.replace(location.pathname + '?_r=' + Date.now())
            }
          }
        },
        true,
      )
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
