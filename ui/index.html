<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

         an exact pixel-size match for custom PWA startup images. -->

    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1290x2796.jpg" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1179x2556.jpg" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />

    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-1170x2532.jpg" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/splash/splash-828x1792.jpg" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#07060c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Opaque black status bar: iOS lays the app out BELOW the clock, so the
         brand can never underlap it — no env(safe-area-inset-top) required.
         With the pure-black theme the bar is indistinguishable from the app,
         so nothing is lost vs black-translucent (which needed padding that
         proved unreliable across builds/devices). -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="StatFax" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Self-heal stale hashed assets after a deploy. Entry script/link errors,
      // Vite preload failures, and React.lazy dynamic imports travel through
      // different browser paths, so cover all three. The timestamp guard stops
      // a broken deployment from creating a reload loop while allowing a later
      // deployment in the same browser session to recover normally.
      ;(function () {
        var RELOAD_KEY = 'sfStaleReloadAt'
        var COOLDOWN_MS = 30000
        var reloading = false
        var chunkError = /failed to fetch dynamically imported module|error loading dynamically imported module|importing a module script failed|unable to preload css|loading css chunk|loading chunk .* failed|chunkloaderror/i

        function messageOf(value) {
          if (typeof value === 'string') return value
          if (value && typeof value.message === 'string') return value.message
          if (value && value.reason && typeof value.reason.message === 'string') return value.reason.message
          return String(value || '')
        }

        function recover(force) {
          if (reloading) return false
          var now = Date.now()
          var url = new URL(location.href)
          var last = Number(url.searchParams.get('_r')) || 0
          try { last = Math.max(last, Number(sessionStorage.getItem(RELOAD_KEY)) || 0) } catch (_) {}
          if (!force && last && now - last < COOLDOWN_MS) return false
          reloading = true
          try { sessionStorage.setItem(RELOAD_KEY, String(now)) } catch (_) {}
          url.searchParams.set('_r', String(now))
          location.replace(url.href)
          return true
        }

        window.__STATFAX_RECOVER_STALE_ASSET__ = recover

        window.addEventListener('error', function (event) {
          var target = event && event.target
          if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK') && /\/assets\//.test(target.src || target.href || '')) recover(false)
        }, true)

        window.addEventListener('vite:preloadError', function (event) {
          event.preventDefault()
          recover(false)
        })

        window.addEventListener('unhandledrejection', function (event) {
          if (!chunkError.test(messageOf(event))) return
          event.preventDefault()
          recover(false)
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
